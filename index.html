<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Detector Inteligente</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

video, canvas {
  position: absolute;
  top: 0;
  left: 0;
}

button {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 10;
  padding: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<button onclick="switchCamera()">Trocar Câmera</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let previousFrame = null;
let stableCount = 0;
let currentFacingMode = "environment"; // traseira

async function startCamera() {
  if (window.stream) {
    window.stream.getTracks().forEach(track => track.stop());
  }

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: currentFacingMode }
  });

  window.stream = stream;
  video.srcObject = stream;
}

function switchCamera() {
  currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
  startCamera();
}

video.addEventListener("loadeddata", () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  function detectMotion() {
    ctx.drawImage(video, 0, 0);

    const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);

    if (previousFrame) {
      let diff = 0;
      let minX = canvas.width, minY = canvas.height;
      let maxX = 0, maxY = 0;

      for (let i = 0; i < frame.data.length; i += 16) { // otimizado (pula pixels)
        let delta =
          Math.abs(frame.data[i] - previousFrame.data[i]) +
          Math.abs(frame.data[i+1] - previousFrame.data[i+1]) +
          Math.abs(frame.data[i+2] - previousFrame.data[i+2]);

        if (delta > 60) {
          diff++;

          let index = i / 4;
          let x = index % canvas.width;
          let y = Math.floor(index / canvas.width);

          if (x < minX) minX = x;
          if (y < minY) minY = y;
          if (x > maxX) maxX = x;
          if (y > maxY) maxY = y;
        }
      }

      const area = (maxX - minX) * (maxY - minY);

      if (diff > 2000 && area > 1500 && area < 60000) {
        stableCount++;

        if (stableCount > 2) {
          ctx.strokeStyle = "lime";
          ctx.lineWidth = 3;
          ctx.strokeRect(minX, minY, maxX - minX, maxY - minY);
        }
      } else {
        stableCount = 0;
      }
    }

    previousFrame = frame;
    requestAnimationFrame(detectMotion);
  }

  detectMotion();
});

// inicia câmera
startCamera();
</script>

</body>
</html>
