<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Câmera de Segurança</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
}

video, canvas {
  position: absolute;
  top: 0;
  left: 0;
}

#alert {
  position: absolute;
  top: 20px;
  left: 20px;
  background: red;
  padding: 10px;
  font-size: 20px;
  display: none;
}

#status {
  position: absolute;
  bottom: 20px;
  left: 20px;
  font-size: 16px;
}

#snapshot {
  position: absolute;
  bottom: 20px;
  right: 20px;
  width: 120px;
  border: 2px solid white;
}
</style>
</head>

<body>

<div id="alert">🚨 MOVIMENTO DETECTADO</div>
<div id="status">Aguardando...</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<img id="snapshot" />

<audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const alertBox = document.getElementById("alert");
const statusText = document.getElementById("status");
const snapshot = document.getElementById("snapshot");
const alarm = document.getElementById("alarm");

let previousFrame = null;
let motionCount = 0;
let lastAlertTime = 0;

// iniciar câmera
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => {
  video.srcObject = stream;
});

video.addEventListener("loadeddata", () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  function detectMotion() {
    ctx.drawImage(video, 0, 0);

    const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);

    if (previousFrame) {
      let diff = 0;

      for (let i = 0; i < frame.data.length; i += 16) {
        let delta =
          Math.abs(frame.data[i] - previousFrame.data[i]) +
          Math.abs(frame.data[i+1] - previousFrame.data[i+1]) +
          Math.abs(frame.data[i+2] - previousFrame.data[i+2]);

        if (delta > 60) diff++;
      }

      // DETECÇÃO
      if (diff > 1500) {
        motionCount++;
      } else {
        motionCount = 0;
      }

      // ALERTA REAL
      if (motionCount > 3 && Date.now() - lastAlertTime > 3000) {
        lastAlertTime = Date.now();

        alertBox.style.display = "block";
        statusText.innerText = "🚨 Movimento detectado!";

        // tocar som
        alarm.play();

        // salvar imagem
        snapshot.src = canvas.toDataURL("image/png");

        setTimeout(() => {
          alertBox.style.display = "none";
        }, 2000);
      } else {
        statusText.innerText = "🟢 Ambiente normal";
      }
    }
    
    previousFrame = frame;
  }
    
    function loop() {
  detectMotion();
  setTimeout(loop, 100);
}

loop();
});
</script>

</body>
</html>
