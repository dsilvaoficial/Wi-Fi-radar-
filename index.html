<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Detector de Movimento</title>
<style>
  body { margin:0; background:black; }
  video, canvas {
    position:absolute;
    top:0;
    left:0;
  }
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let previousFrame = null;

// Acessar câmera
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  video.srcObject = stream;
})
.catch(err => console.error(err));

video.addEventListener("loadeddata", () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  function detectMotion() {
    ctx.drawImage(video, 0, 0);

    let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);

    if (previousFrame) {
      let diff = 0;
      let minX = canvas.width, minY = canvas.height;
      let maxX = 0, maxY = 0;

      for (let i = 0; i < frame.data.length; i += 4) {
        let r = frame.data[i];
        let g = frame.data[i+1];
        let b = frame.data[i+2];

        let r2 = previousFrame.data[i];
        let g2 = previousFrame.data[i+1];
        let b2 = previousFrame.data[i+2];

        let delta = Math.abs(r - r2) + Math.abs(g - g2) + Math.abs(b - b2);

        if (delta > 50) {
          diff++;

          let index = i / 4;
          let x = index % canvas.width;
          let y = Math.floor(index / canvas.width);

          if (x < minX) minX = x;
          if (y < minY) minY = y;
          if (x > maxX) maxX = x;
          if (y > maxY) maxY = y;
        }
      }

      // Se teve mudança suficiente
      if (diff > 5000) {
        ctx.strokeStyle = "lime";
        ctx.lineWidth = 3;
        ctx.strokeRect(minX, minY, maxX - minX, maxY - minY);
      }
    }

    previousFrame = frame;
    requestAnimationFrame(detectMotion);
  }

  detectMotion();
});
</script>

</body>
</html>
